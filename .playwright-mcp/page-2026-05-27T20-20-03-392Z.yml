  - generic [ref=e16]: "Navigation is a stack, not a route table. # go deeper def handle_info ({ :tap , :open_dice }, socket) do { :noreply , Mob . Socket .push_screen(socket, Mobdemo . DiceScreen )} end # go back def handle_info ({ :tap , :back }, socket) do { :noreply , Mob . Socket .pop_screen(socket)} end Web is a tree of URLs . Mobile is a stack of screens . So nav is push / pop on a stack — held in a GenServer. Here, Mob follows mobile's precedent, not the web's."