  - generic [ref=e36]: "Navigation is a layout, too. A Screen lays out components. The App lays out navigation — and it's platform-aware. use Mob . App # follow each platform's native pattern def navigation ( :ios ), do: tab_bar([stack( :home , root: HomeScreen ), stack( :browse , root: BrowseScreen )]) def navigation ( :android ), do: drawer([stack( :home , root: HomeScreen ), stack( :browse , root: BrowseScreen )]) def navigation (_), do: stack( :main , root: HomeScreen ) tab_bar → UITabBarController (iOS) · bottom nav bar (Android). drawer → native side drawer (Android). Tabs feel right on iOS, a drawer on Android — follow the precedent. stack / tab_bar / drawer just return maps — navigation is data too."